<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSV Unit Name Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 40px; max-width: 600px; }
        .drop-zone-label {
            display: block;
            border: 2px dashed #ccc;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            background: #fff;
        }
        .drop-zone-label:hover {
            border-color: #000;
            background: #fafafa;
        }
        #log { white-space: pre-wrap; background: #eee; padding: 10px; font-family: monospace; display: none; }
    </style>
</head>
<body>

    <h2>CSV Multi-Unit Name Editor</h2>
    <p>Select or drag and drop CSV files. Updated files will automatically download bundled inside a single ZIP file.</p>

    <label for="fileInput" id="dropZone" class="drop-zone-label">
        Drag & drop CSV files here or <strong>click to select</strong>
        <input type="file" id="fileInput" multiple accept=".csv" style="display: none;">
    </label>

    <div id="log"></div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const log = document.getElementById('log');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#000';
            dropZone.style.background = '#fafafa';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '#ccc';
            dropZone.style.background = '#fff';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#ccc';
            dropZone.style.background = '#fff';
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function printLog(text) {
            log.style.display = 'block';
            log.textContent += text + "\n";
        }

        // Silent row processor - updates counts object instead of logging
        function processRow(row, counts) {
            if (!row || !row[0] || !row[0].trim()) {
                counts.skipped++;
                return null;
            }
            const cleanId = row[0].trim();
            if (cleanId.startsWith('//') || cleanId.startsWith('#') || cleanId.startsWith(';')) {
                counts.skipped++;
                return null;
            }
            if (cleanId === '<ID|readonly|noverify>') {
                return null; // Header row isn't counted as "skipped" work
            }
            if (row.length < 2) {
                counts.skipped++;
                return null;
            }

            const unitName = row[1].trim();
            if (!cleanId.endsWith('_0') && !cleanId.endsWith('_1') && !cleanId.endsWith('_2') && !cleanId.endsWith('_shop')) {
                counts.skipped++;
                return null;
            }
            
            return { identifier: cleanId, unitName: unitName };
        }

        function handleFiles(files) {
            if (files.length === 0) return;

            log.textContent = ""; // Clear previous log
            printLog(`Selected ${files.length} file(s). Starting processing...`);
            
            const zip = new JSZip();
            let processedCount = 0;

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    try {
                        const text = e.target.result;
                        const lines = text.split(/\r?\n/);
                        
                        // Per-file metrics tracking
                        const counts = { skipped: 0, changed: 0 };
                        const unitNames = {};
                        let foundAnyValidRows = false;

                        // Pass 1: Gather _1 maps
                        lines.forEach((line, index) => {
                            if (index === 0 || !line.trim()) return;
                            const row = line.split(';');
                            const processed = processRow(row, counts);
                            if (processed) {
                                foundAnyValidRows = true;
                                if (processed.identifier.endsWith('_1')) {
                                    const baseId = processed.identifier.slice(0, -2);
                                    unitNames[baseId] = processed.unitName;
                                }
                            }
                        });

                        if (!foundAnyValidRows) {
                            const summary = `Skipped ${file.name}: No valid target IDs found to parse.`;
                            console.log(summary);
                            printLog(summary);
                            checkCompletion();
                            return;
                        }

                        // Pass 2: Apply changes
                        const outputLines = ['<ID|readonly|noverify>;<English>'];

                        lines.forEach((line, index) => {
                            if (index === 0 || !line.trim()) return;
                            
                            const row = line.split(';');
                            // Dummy count object for pass 2 to prevent double-counting skipped lines
                            const dummyCounts = { skipped: 0, changed: 0 };
                            const processed = processRow(row, dummyCounts);

                            if (!processed) {
                                outputLines.push(line);
                                return;
                            }

                            let currentUnitName = processed.unitName;
                            if (processed.identifier.endsWith('_2')) {
                                const baseId = processed.identifier.slice(0, -2);
                                if (baseId in unitNames && currentUnitName !== unitNames[baseId]) {
                                    currentUnitName = unitNames[baseId];
                                    counts.changed++;
                                }
                            }
                            outputLines.push(`${processed.identifier};${currentUnitName}`);
                        });

                        // Add updated file contents directly into our ZIP generator
                        const outputText = outputLines.join('\n');
                        zip.file(file.name, outputText);

                        const summary = `${file.name} -> Processed successfully. Changes: ${counts.changed} | Skipped lines: ${counts.skipped}`;
                        console.log(summary);
                        printLog(summary);

                    } catch (err) {
                        const errorMsg = `CRITICAL ERROR in ${file.name}: ${err.message}`;
                        console.error(errorMsg, err);
                        printLog(errorMsg);
                    }

                    checkCompletion();
                };
                
                reader.readAsText(file);
            });

            // Tracking asynchronously loaded files to package everything at the absolute end
            function checkCompletion() {
                processedCount++;
                if (processedCount === files.length) {
                    printLog("\nPackaging updated files into a ZIP archive...");
                    
                    zip.generateAsync({ type: "blob" }).then(function(content) {
                        const url = URL.createObjectURL(content);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = "updated_csv_files.zip";
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        
                        console.log("ZIP archive downloaded safely.");
                        printLog("==============================\nProcess finished. ZIP downloaded.");
                    });
                }
            }
        }
    </script>
</body>
</html>
