<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSV Unit Name Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            font-family: "Times New Roman", Times, Baskerville, Georgia, serif;
            background: #121212;
            color: #e0e0e0;
        }
        body {
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        p {
            margin: 0 0 15px 0;
            width: 100%;
            overflow-wrap: break-word;
            font-size: 1.1rem;
        }
        .drop-zone-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            border: 2px dashed #444;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            background: #1e1e1e;
            font-size: 1.3rem;
            color: #e0e0e0;
        }
        .drop-zone-label:hover {
            border-color: #888;
            background: #252525;
        }
        #log { 
            white-space: pre-wrap; 
            background: #1e1e1e;
            color: #a5d6a7;
            padding: 15px; 
            font-family: monospace; 
            display: none; 
            width: 100%;
            max-height: 250px;
            overflow-y: auto;
            border-radius: 4px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <p>Replaces _2 entries with _1 entries making it possible to see <5km naming at all times (air vehicles).</p>

    <label for="fileInput" id="dropZone" class="drop-zone-label">
        <div>Drag & drop CSV file(s) here or <strong>click to select</strong></div>
        <input type="file" id="fileInput" multiple accept=".csv" style="display: none;">
    </label>

    <div id="log"></div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const log = document.getElementById('log');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#888';
            dropZone.style.background = '#252525';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '#444';
            dropZone.style.background = '#1e1e1e';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#444';
            dropZone.style.background = '#1e1e1e';
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function printLog(text) {
            log.style.display = 'block';
            log.textContent += text + "\n";
            log.scrollTop = log.scrollHeight;
        }

        function processRow(row, counts) {
            if (!row || !row[0] || !row[0].trim()) {
                counts.skipped++;
                return null;
            }
            const cleanId = row[0].trim();
            if (cleanId.startsWith('//') || cleanId.startsWith('#') || cleanId.startsWith(';')) {
                counts.skipped++;
                return null;
            }
            if (cleanId === '<ID|readonly|noverify>') {
                return null; 
            }
            if (row.length < 2) {
                counts.skipped++;
                return null;
            }

            const unitName = row[1].trim();
            if (!cleanId.endsWith('_0') && !cleanId.endsWith('_1') && !cleanId.endsWith('_2') && !cleanId.endsWith('_shop')) {
                counts.skipped++;
                return null;
            }
            
            return { identifier: cleanId, unitName: unitName };
        }

        function handleFiles(files) {
            if (files.length === 0) return;

            log.textContent = ""; 
            printLog(`Selected ${files.length} file(s). Starting processing...`);
            
            const zip = new JSZip();
            let processedCount = 0;

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    try {
                        const text = e.target.result;
                        const lines = text.split(/\r?\n/);
                        
                        const counts = { skipped: 0, changed: 0 };
                        const unitNames = {};
                        let foundAnyValidRows = false;

                        lines.forEach((line, index) => {
                            if (index === 0 || !line.trim()) return;
                            const row = line.split(';');
                            const processed = processRow(row, counts);
                            if (processed) {
                                foundAnyValidRows = true;
                                if (processed.identifier.endsWith('_1')) {
                                    const baseId = processed.identifier.slice(0, -2);
                                    unitNames[baseId] = processed.unitName;
                                }
                            }
                        });

                        if (!foundAnyValidRows) {
                            const summary = `Skipped ${file.name}: No valid target IDs found to parse.`;
                            console.log(summary);
                            printLog(summary);
                            checkCompletion();
                            return;
                        }

                        const outputLines = ['<ID|readonly|noverify>;<English>'];

                        lines.forEach((line, index) => {
                            if (index === 0 || !line.trim()) return;
                            
                            const row = line.split(';');
                            const dummyCounts = { skipped: 0, changed: 0 };
                            const processed = processRow(row, dummyCounts);

                            if (!processed) {
                                outputLines.push(line);
                                return;
                            }

                            let currentUnitName = processed.unitName;
                            if (processed.identifier.endsWith('_2')) {
                                const baseId = processed.identifier.slice(0, -2);
                                if (baseId in unitNames && currentUnitName !== unitNames[baseId]) {
                                    currentUnitName = unitNames[baseId];
                                    counts.changed++;
                                }
                            }
                            outputLines.push(`${processed.identifier};${currentUnitName}`);
                        });

                        const outputText = outputLines.join('\n');
                        zip.file(file.name, outputText);

                        const summary = `${file.name} -> Processed successfully. Changes: ${counts.changed} | Skipped lines: ${counts.skipped}`;
                        console.log(summary);
                        printLog(summary);

                    } catch (err) {
                        const errorMsg = `CRITICAL ERROR in ${file.name}: ${err.message}`;
                        console.error(errorMsg, err);
                        printLog(errorMsg);
                    }

                    checkCompletion();
                };
                
                reader.readAsText(file);
            });

            function checkCompletion() {
                processedCount++;
                if (processedCount === files.length) {
                    printLog("\nPackaging updated files into a ZIP archive...");
                    
                    zip.generateAsync({ type: "blob" }).then(function(content) {
                        const url = URL.createObjectURL(content);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = "updated_csv_files.zip";
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        
                        console.log("ZIP downloaded");
                        printLog("==============================\nProcess finished. ZIP downloaded.");
                    });
                }
            }
        }
    </script>
</body>
</html>
